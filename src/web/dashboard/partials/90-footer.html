      <button class="auth-tab" id="auth-tab-register" type="button" onclick="switchAuthMode('register')">注册</button>

        <span>显示名称</span>
        <input id="register-display-name" autocomplete="nickname" placeholder="交易员 A">
      </label>
      <label class="auth-field">
        <span>密码</span>
        <input id="register-password" type="password" autocomplete="new-password" placeholder="至少 6 位">
      </label>
      <label class="auth-field">
        <span>确认密码</span>
        <input id="register-password-confirm" type="password" autocomplete="new-password" placeholder="再次输入密码">

    </form>
